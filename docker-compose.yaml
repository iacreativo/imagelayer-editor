version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - editor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - RUNNINGHUB_API_KEY=${RUNNINGHUB_API_KEY}
      - RUNNINGHUB_BASE_URL=${RUNNINGHUB_BASE_URL}
      - RUNNINGHUB_ENDPOINT=${RUNNINGHUB_ENDPOINT}
      - RUNNINGHUB_WORKFLOW_ID=${RUNNINGHUB_WORKFLOW_ID}
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - editor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/api/images"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  editor-network:
    driver: bridge

volumes:
  backend_uploads:
